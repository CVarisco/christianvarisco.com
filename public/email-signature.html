<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Christian Varisco email signature</title>
  </head>
  <body
    style="
      margin: 24px;
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
    "
  >
    <table
      role="presentation"
      cellpadding="0"
      cellspacing="0"
      border="0"
      style="font-family: Arial, Helvetica, sans-serif; color: #333333"
    >
      <tr>
        <td style="padding: 0 12px 0 0; vertical-align: top">
          <img
            src="https://christianvarisco.com/images/signature/christian-varisco.png"
            width="80"
            height="80"
            alt="Christian Varisco"
            style="display: block; border: 0; width: 80px; height: 80px"
          />
        </td>
        <td style="padding: 0; vertical-align: top; width: 285px">
          <div
            style="
              font-size: 15px;
              line-height: 18px;
              font-weight: 700;
              color: #333333;
            "
          >
            Christian Varisco
          </div>
          <div style="font-size: 13px; line-height: 17px; color: #333333">
            Fractional CTO
          </div>
          <div
            style="
              border-top: 1px solid #c9c9c9;
              height: 1px;
              line-height: 1px;
              margin: 6px 0 5px 0;
            "
          >
            &nbsp;
          </div>
          <div style="font-size: 12px; line-height: 16px; color: #333333">
            E:&nbsp;
            <a
              href="mailto:christian@christianvarisco.com"
              style="color: #139f2e; text-decoration: underline"
              >christian@christianvarisco.com</a
            >
          </div>
          <table
            role="presentation"
            cellpadding="0"
            cellspacing="0"
            border="0"
            style="margin-top: 5px"
          >
            <tr>
              <td style="padding: 0 14px 0 0; vertical-align: middle">
                <a
                  href="https://christianvarisco.com/"
                  style="
                    color: #13a538;
                    font-size: 12px;
                    line-height: 15px;
                    text-decoration: underline;
                  "
                >
                  <img
                    src="https://christianvarisco.com/images/signature/logo.png"
                    width="13"
                    height="13"
                    alt="Website"
                    style="
                      border: 0;
                      display: inline-block;
                      vertical-align: -2px;
                      width: 13px;
                      height: 13px;
                    "
                  />
                </a>
              </td>
              <td style="padding: 0; vertical-align: middle">
                <a
                  href="https://www.linkedin.com/in/christianvarisco/"
                  style="
                    color: #13a538;
                    font-size: 12px;
                    line-height: 15px;
                    text-decoration: underline;
                  "
                >
                  <img
                    src="https://christianvarisco.com/images/signature/linkedin.png"
                    width="13"
                    height="13"
                    alt="LinkedIn"
                    style="
                      border: 0;
                      display: inline-block;
                      vertical-align: -2px;
                      width: 13px;
                      height: 13px;
                    "
                  />
                </a>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
